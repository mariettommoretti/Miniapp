<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App Shop</title>

<style>
body {
  margin:0;
  background:#0d0d0d;
  color:white;
  font-family:sans-serif;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a1a;
  border-radius:15px;
  padding:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:orange;
  color:black;
  font-weight:bold;
}

.back {
  background:#333;
}

/* CAROUSEL */
.carousel-container {
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  display: flex;
  scroll-behavior: smooth;
}

.carousel {
  display: flex;
}

.carousel img,
.carousel video {
  width: 100%;
  flex-shrink: 0;
  scroll-snap-align: center;
  border-radius: 12px;
}

.carousel-container::-webkit-scrollbar {
  display: none;
}

.dots {
  text-align: center;
  margin: 10px 0;
}

.dot {
  height: 6px;
  width: 6px;
  margin: 3px;
  background: #555;
  display: inline-block;
  border-radius: 50%;
}

.dot.active {
  background: orange;
}

/* ZOOM */
.zoom-overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.zoom-overlay img {
  width:100%;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
// BOT USERNAME
const BOT_USERNAME = "TUO_USERNAME_BOT"; // 🔥 CAMBIA QUI

// CATEGORIE
const categories = [
  "WEED","HASH","EXTRACTION",
  "EDIBLES","VAPE","OFFERS"
];

// PRODOTTI (10 per categoria)
const products = [];

categories.forEach(cat => {
  for(let i=1;i<=10;i++){
    products.push({
      name: cat + " Product " + i,
      category: cat,

      // 🔥 AGGIUNGI QUI VIDEO/IMMAGINI
      media: [
        {type:"image", url:"https://via.placeholder.com/400"},
        {type:"video", url:"https://www.w3schools.com/html/mov_bbb.mp4"}
      ],

      prices: {
        "10g": 100 + i,
        "50g": 400 + i,
        "100g": 700 + i
      }
    });
  }
});

// NAVIGAZIONE
let page = "home";
let currentCategory = null;
let currentProduct = null;

// RENDER
function render(){
  const app = document.getElementById("app");

  if(page === "home"){
    app.innerHTML = `
      <div class="grid">
        ${categories.map(c=>`
          <div class="card" onclick="openCategory('${c}')">
            <img src="https://via.placeholder.com/400">
            <h3>${c}</h3>
          </div>
        `).join("")}
      </div>
    `;
  }

  if(page === "category"){
    const list = products.filter(p=>p.category===currentCategory);

    app.innerHTML = `
      <button class="back" onclick="goHome()">← Back</button>
      <div class="grid">
        ${list.map((p,i)=>`
          <div class="card" onclick="openProduct(${i})">
            <img src="${p.media[0].url}">
            <h4>${p.name}</h4>
          </div>
        `).join("")}
      </div>
    `;
  }

  if(page === "product"){
    const p = currentProduct;

    app.innerHTML = `
      <button class="back" onclick="goCategory()">← Back</button>

      <div class="carousel-container" id="carouselContainer">
        <div class="carousel">
          ${p.media.map((m,i)=> 
            m.type==="image"
            ? `<img src="${m.url}" onclick="zoomImage('${m.url}')">`
            : `<video src="${m.url}" muted loop playsinline id="vid${i}"></video>`
          ).join("")}
        </div>
      </div>

      <div class="dots">
        ${p.media.map((_,i)=>`<span class="dot" id="dot${i}"></span>`).join("")}
      </div>

      <div>
        ${Object.entries(p.prices).map(([k,v])=>`
          <button onclick="orderNow('${p.name}','${k}',${v})">
            ${k} → €${v}
          </button>
        `).join("")}
      </div>
    `;

    initCarousel();
  }
}

// NAV
function openCategory(cat){
  currentCategory = cat;
  page = "category";
  render();
}

function openProduct(i){
  const list = products.filter(p=>p.category===currentCategory);
  currentProduct = list[i];
  page = "product";
  render();
}

function goHome(){
  page = "home";
  render();
}

function goCategory(){
  page = "category";
  render();
}

// TELEGRAM ORDER
function orderNow(name, qty, price){
  const msg = `🛒 Ordine:
Prodotto: ${name}
Quantità: ${qty}
Prezzo: €${price}`;

  window.open(
    `https://t.me/${BOT_USERNAME}?start=${encodeURIComponent(msg)}`,
    "_blank"
  );
}

// CAROUSEL LOGIC
function initCarousel(){
  setTimeout(() => {
    const container = document.getElementById("carouselContainer");
    const dots = document.querySelectorAll(".dot");
    const videos = document.querySelectorAll("video");

    if(!container) return;

    function update(){
      const index = Math.round(container.scrollLeft / container.offsetWidth);

      dots.forEach(d => d.classList.remove("active"));
      if(dots[index]) dots[index].classList.add("active");

      videos.forEach((v,i)=>{
        if(i === index){
          v.play().catch(()=>{});
        } else {
          v.pause();
          v.currentTime = 0;
        }
      });
    }

    container.addEventListener("scroll", update);
    update();
  }, 100);
}

// ZOOM
function zoomImage(url){
  const div = document.createElement("div");
  div.className = "zoom-overlay";
  div.innerHTML = `<img src="${url}">`;
  div.onclick = () => div.remove();
  document.body.appendChild(div);
}

// START
render();
</script>

</body>
</html>
